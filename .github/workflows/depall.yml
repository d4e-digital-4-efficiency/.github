name: Deploy Timesheet Workflow (All Repos)

on:
  workflow_dispatch:
    inputs:
      exclude:
        description: 'Repos à exclure en plus (séparés par des virgules)'
        required: false
        default: ''

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo central
        uses: actions/checkout@v3
        with:
          repository: ${{ github.repository_owner }}/.github
          token: ${{ secrets.DEPLOY_TOKEN }}
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Deploy workflow to all repos
        env:
          GITHUB_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          ORG_NAME: ${{ github.repository_owner }}
          EXTRA_EXCLUDE: ${{ github.event.inputs.exclude }}
        run: python scripts/deploy_timesheet_all.py
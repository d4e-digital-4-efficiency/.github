name: Bot de déploiement d4e_construction

on:
  workflow_dispatch:
    inputs:
      repository:
        description: "Nom du repo cible (vide = tous les repos ElvyBat)"
        required: false
        type: string
      version:
        description: "Version Odoo cible"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - v17
          - v18
          - v19

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout du repo central .github
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configurer git
        run: |
          git config --global user.name "${{ vars.BOT_GIT_USERNAME || 'd4e-ch' }}"
          git config --global user.email "${{ vars.BOT_GIT_EMAIL || 'it@digital4efficiency.ch' }}"

      - name: Exécuter le bot de déploiement
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          SOURCE_OWNER: d4e-digital-4-efficiency
          SOURCE_REPO: d4e-common-def
          BOT_BRANCH: bot/update-d4e_construction
          DASHBOARD_ISSUE: "1006"
          GIT_USERNAME: ${{ vars.BOT_GIT_USERNAME || 'd4e-ch' }}
          GIT_EMAIL: ${{ vars.BOT_GIT_EMAIL || 'it@digital4efficiency.ch' }}
          TARGET_REPO: ${{ inputs.repository }}
          TARGET_VERSION: ${{ inputs.version }}
        run: python .github/scripts/deployment_bot.py

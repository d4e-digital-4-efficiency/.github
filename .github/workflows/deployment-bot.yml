name: Bot de déploiement d4e_construction

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout du repo central .github
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configurer git
        run: |
          git config --global user.name "${{ vars.BOT_GIT_USERNAME || 'marc-d4e' }}"
          git config --global user.email "${{ vars.BOT_GIT_EMAIL || 'marc@digital4efficiency.ch' }}"

      - name: Exécuter le bot de déploiement
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          SOURCE_OWNER: d4e-digital-4-efficiency
          SOURCE_REPO: d4e-common-def
          BOT_BRANCH: bot/update-d4e_construction
          DASHBOARD_ISSUE: "1"
          GIT_USERNAME: ${{ vars.BOT_GIT_USERNAME || 'marc-d4e' }}
          GIT_EMAIL: ${{ vars.BOT_GIT_EMAIL || 'marc@digital4efficiency.ch' }}
        run: python .github/scripts/deployment_bot.py
